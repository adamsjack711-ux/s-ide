name: Release macOS DMG

# Builds the signed-by-default-off macOS DMG and attaches it to the GitHub
# Release for a version tag. Ship a "big update" by bumping the version and
# pushing a matching tag:
#
#   npm --prefix frontend version minor   # or: major / patch / 0.3.0
#   git commit -am "Release vX.Y.Z" && git tag vX.Y.Z && git push --follow-tags
#
# The tag push triggers this workflow → the DMG on the Releases page updates.
# (Or run it by hand from the Actions tab via "Run workflow" with a tag.)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build & release (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-14 # Apple Silicon (arm64) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps (sidecar + PyInstaller)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt
          # macOS-only pyobjc frameworks the PyInstaller spec collects
          # (CoreWLAN / CoreBluetooth / Foundation) — not in the bundle file
          # so Linux CI stays green; installed here for the Mac DMG build.
          pip install pyobjc-core pyobjc-framework-Cocoa \
                      pyobjc-framework-CoreWLAN pyobjc-framework-CoreBluetooth

      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Build DMG (PyInstaller sidecar + Vite + electron-builder)
        working-directory: frontend
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false" # unsigned / ad-hoc build

      - name: Attach DMG to the Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.dmg.blockmap
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
