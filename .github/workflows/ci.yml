name: CI

# Runs on every PR and on pushes to main. Three gates:
#   · frontend — typecheck + vitest
#   · backend  — pytest (incl. the spine + attestation-gate tests)
#   · supply-chain — fail on a known-bad advisory in the committed lockfiles
#
# There was no PR/push CI before (only the tag-triggered release build); this is
# the gate that keeps the review-fix invariants (bus contract, redaction, the
# attestation gate) green and surfaces dependency advisories.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt pytest
      - name: Tests
        run: python -m pytest -q

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Fail on a high/critical advisory in PRODUCTION deps (the ones that ship
      # in the packaged app). Dev-tool advisories (vite/vitest) are excluded to
      # keep the gate signal-not-noise; tune with --audit-level / --omit as needed.
      - name: npm audit (frontend, prod deps)
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # pip-audit resolves requirements-bundle.txt (the bundled sidecar deps) and
      # fails on any dependency with a known vulnerability.
      - name: pip-audit (backend, bundled deps)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r backend/requirements-bundle.txt
