# OWASP WebGoat + WebWolf
#
# WebGoat is the lesson host (the vulnerable app you attack); WebWolf is
# the companion service that hosts attacker-controlled files and catches
# callbacks for the CSRF / exfil exercises.
#
# As of WebGoat 2023.x both run from a SINGLE upstream image
# (webgoat/webgoat): WebGoat on 8080, WebWolf on 9090. There is no longer a
# separate webgoat/webwolf image on Docker Hub, so this is one service that
# publishes both ports. We pin the tag so a point-release that breaks a
# lesson doesn't surprise users.

name: mhp-lab-webgoat

services:
  webgoat:
    image: webgoat/webgoat:v2023.8
    container_name: mhp-lab-webgoat
    # Loopback-only — the lab is for the user, not the LAN.
    ports:
      - "127.0.0.1:8084:8080"   # WebGoat lesson host
      - "127.0.0.1:9094:9090"   # WebWolf companion (exfil / CSRF callbacks)
    environment:
      # Bind both services on all interfaces inside the container so the
      # published loopback ports reach them.
      - WEBGOAT_HOST=0.0.0.0
      - WEBWOLF_HOST=0.0.0.0
      - WEBGOAT_PORT=8080
      - WEBWOLF_PORT=9090
      - TZ=UTC
    restart: unless-stopped
